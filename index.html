<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Student Profile Card</title>
		<style>
			:root{--card-w:340px;--radius:16px;--accent1:#6a11cb;--accent2:#2575fc}
			*{box-sizing:border-box}
			html,body{height:100%}
			body{
				margin:0;display:flex;align-items:center;justify-content:center;
				background:linear-gradient(180deg,#eef2ff 0%,#f8fafc 100%);
				font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
				color:#0f172a;
				padding:40px;
			}

			.card{
				width:var(--card-w);
				border-radius:calc(var(--radius) + 6px);
				padding:22px;
				background:linear-gradient(135deg,var(--accent1),var(--accent2));
				box-shadow:0 10px 30px rgba(23,0,102,0.18), 0 2px 6px rgba(15,23,42,0.08);
				color:#fff;
				display:grid;gap:12px;align-items:center;
			}

			.profile-top{display:flex;gap:14px;align-items:center}

			.avatar{
				width:96px;height:96px;flex:0 0 96px;border-radius:12px;overflow:hidden;box-shadow:0 6px 18px rgba(2,6,23,0.25);
				background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center
			}

			.avatar svg{display:block;width:100%;height:100%}

			.name{font-size:1.15rem;margin:0;font-weight:700;letter-spacing:0.2px}
			.stream{margin:0;font-size:.9rem;opacity:0.92}
			.bio{margin:6px 0 0 0;font-size:.9rem;line-height:1.35;opacity:0.95}

			.meta{display:flex;flex-direction:column;justify-content:center}

			/* subtle card inner area with soft white panel for details */
			.card-body{
				margin-top:6px;background:rgba(255,255,255,0.97);color:#081023;padding:14px;border-radius:12px;
				box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
			}

			.label{font-size:0.78rem;color:#475569;margin:0 0 6px}

			@media (max-width:380px){
				.card{width:92%;padding:16px}
				.avatar{width:80px;height:80px}
			}
		</style>
	</head>
	<body>
		<article class="card" aria-label="Student profile card">
			<div class="profile-top">
				<div class="avatar" aria-hidden="true">
					<!-- inline SVG placeholder with rounded corners and initials -->
					<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile placeholder">
						<defs>
							<linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
								<stop offset="0" stop-color="#ffd166"/>
								<stop offset="1" stop-color="#ef476f"/>
							</linearGradient>
						</defs>
						<rect width="120" height="120" rx="14" fill="url(#g)"/>
						<text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" fill="rgba(255,255,255,0.95)">JS</text>
					</svg>
				</div>

				<div class="meta">
					<h1 class="name">J.Sharumathy</h1>
					<p class="stream">Stream: Computer Science</p>
				</div>
			</div>

			<div class="card-body">
				<p class="label">Short bio</p>
				<p class="bio">Curious computer science student passionate about web development, algorithms, and building delightful user experiences.</p>
			</div>
		</article>
	</body>
</html>
